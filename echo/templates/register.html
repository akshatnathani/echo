{% extends "base.html" %}

{% block content %}
<div id="register-container" class="container">
    <div class="form-box">
        <h2 id="register-title">Register</h2>
        <form id="register-form" method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" id="register-submit">Register</button>
        </form>
        <p id="register-login-link">
            Already have an account? <a href="{{ url_for('login') }}" id="login-link">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
